<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | ElectroCatalog</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="register" data-title-key="titles.register">
  <header class="site-header compact">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <span class="brand-mark brand-mark-image">
          <img class="brand-logo-image" src="фото/ChatGPT%20Image%2029%20квіт.%202026%20р.,%2002_45_33.png" alt="ElectroCatalog logo">
        </span>
        <div>
          <h1>ElectroCatalog</h1>
          <p data-i18n="common.brandSubtitle">Electronic product catalog</p>
        </div>
      </a>
      <nav class="header-actions" data-auth-actions></nav>
    </div>
  </header>

  <main class="container auth-layout">
    <section class="auth-card panel">
      <span class="eyebrow" data-i18n="auth.createAccount">Create an account</span>
      <h2 data-i18n="auth.registerTitle">Register</h2>
      <p data-i18n="auth.registerInfo">Registered users can browse the same catalog as guests and keep an account for future features.</p>

      <form id="registerForm" class="form-stack">
        <label class="field">
          <span data-i18n="common.loginField">Login</span>
          <input id="registerLogin" name="login" type="text" minlength="3" required>
        </label>

        <label class="field">
          <span data-i18n="common.password">Password</span>
          <input id="registerPassword" name="password" type="password" minlength="4" required>
        </label>

        <button class="button primary full-width" type="submit" data-i18n="common.register">Register</button>
        <p id="registerMessage" class="form-message" aria-live="polite"></p>
      </form>

      <p class="auth-switch"><span data-i18n="auth.haveAccount">Already have an account?</span> <a href="login.html" data-i18n="auth.loginHere">Login here</a>.</p>
    </section>
  </main>

  <script src="js/data.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
