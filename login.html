<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | ElectroCatalog</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="login" data-title-key="titles.login">
  <header class="site-header compact">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <span class="brand-mark brand-mark-image">
          <img class="brand-logo-image" src="фото/ChatGPT%20Image%2029%20квіт.%202026%20р.,%2002_45_33.png" alt="ElectroCatalog logo">
        </span>
        <div>
          <h1>ElectroCatalog</h1>
          <p data-i18n="common.brandSubtitle">Electronic product catalog</p>
        </div>
      </a>
      <nav class="header-actions" data-auth-actions></nav>
    </div>
  </header>

  <main class="container auth-layout">
    <section class="auth-card panel">
      <span class="eyebrow" data-i18n="auth.welcomeBack">Welcome back</span>
      <h2 data-i18n="auth.loginTitle">Login</h2>
      <p><span data-i18n="auth.loginInfo">Use your account to continue. Admin demo:</span> <strong>admin / admin123</strong>.</p>

      <form id="loginForm" class="form-stack">
        <label class="field">
          <span data-i18n="common.loginField">Login</span>
          <input id="loginValue" name="login" type="text" required>
        </label>

        <label class="field">
          <span data-i18n="common.password">Password</span>
          <input id="passwordValue" name="password" type="password" required>
        </label>

        <button class="button primary full-width" type="submit" data-i18n="common.login">Login</button>
        <p id="loginMessage" class="form-message" aria-live="polite"></p>
      </form>

      <p class="auth-switch"><span data-i18n="auth.noAccountYet">No account yet?</span> <a href="register.html" data-i18n="auth.registerHere">Register here</a>.</p>
    </section>
  </main>

  <script src="js/data.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
